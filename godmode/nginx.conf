server {
    listen 80;
    server_name your_domain_or_ip;

    # Explicitly define webhook path outside the main restrictive block
    location /webhook {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # No IP restrictions here; validation is via signature
    }

    # The absolute barrier blockin unauthorized algorithmic scans
    location / {
        # Only allow traffic from your specific secure gateway or mobile HUD
        allow 192.168.1.0/24; # Your local Cordele grid
        deny all; # Drop everything else into the void

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Enforce Prime Node headers
        proxy_set_header X-Prime-Signature "LOCKED";
    }
}
