<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANNON | Biomechanical Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; padding: 20px; z-index: 100; }
        .hud-label { color: #00ffff; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .hud-value { color: #fff; font-size: 18px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="flex justify-between">
            <div class="module p-4 bg-black/50 border border-cyan-900">
                <p class="hud-label">SIM_COORDINATES</p>
                <p id="coords" class="hud-value">X: 0.00 Y: 0.00 Z: 0.00</p>
            </div>
            <div class="module p-4 bg-black/50 border border-cyan-900 text-right">
                <p class="hud-label">MYTH_STABILITY</p>
                <p id="stability" class="hud-value">99.9%</p>
            </div>
        </div>
        <button onclick="window.location.href='/'" class="mt-4 pointer-events-auto px-4 py-2 bg-cyan-900 hover:bg-cyan-700 text-white text-xs">RETURN TO COMMAND</button>
    </div>

    <script id="autonomy-dash-script">
    // --- ABSOLUTE AUTONOMY DASHBOARD v26.7 ---
    (function(){
      const dash = document.createElement('div');
      dash.id = 'autonomy-dash';
      dash.style.cssText = `
        position: absolute; bottom: 20px; left: 20px; width: 220px; padding: 12px;
        background: rgba(0,0,0,0.85); border: 1px solid #00ffff; color: #00ffff;
        font-size: 10px; z-index: 1000; pointer-events: none; text-transform: uppercase;
        box-shadow: 0 0 15px rgba(0,255,255,0.2);
      `;
      document.body.appendChild(dash);

      const stats = [
        { label: 'Layer', val: 'Physical-3' },
        { label: 'Uptime', val: '0S' },
        { label: 'Phase', val: 'STABILIZE' }
      ];

      function updateHUD() {
        stats[1].val = (performance.now() / 1000).toFixed(0) + 'S';
        dash.innerHTML = `
          <div style="border-bottom: 1px solid #00ffff; margin-bottom: 8px; font-weight: bold;">BRIDGE AUTONOMY</div>
          ${stats.map(s => `<div class="flex justify-between"><span>${s.label}:</span><span>${s.val}</span></div>`).join('')}
        `;
      }
      setInterval(updateHUD, 1000);
    })();
    </script>

    <script>
        // --- BANNON BIOMECHANICAL CORE (v27.2 PRO) ---
        // Reality Compiler: mapping 5D concepts into 3D physics.
        
        let scene, camera, renderer, floor, fighters = [], props = [];
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();

        const IK = {
            solve(start, mid, end, target, pole, aLen, bLen) {
                const toTarget = new THREE.Vector3().subVectors(target, start);
                const dist = Math.min(toTarget.length(), (aLen + bLen) * 0.999);
                const a2 = aLen * aLen, b2 = bLen * bLen, c2 = dist * dist;
                let angleA = Math.acos(THREE.MathUtils.clamp((a2 + c2 - b2) / (2 * aLen * dist), -1, 1));
                const normal = new THREE.Vector3().crossVectors(toTarget, new THREE.Vector3().subVectors(pole, start)).normalize();
                const b1 = new THREE.Vector3().crossVectors(normal, toTarget).normalize();
                const jointPos = new THREE.Vector3().copy(start)
                    .add(toTarget.clone().normalize().multiplyScalar(Math.cos(angleA) * aLen))
                    .add(b1.clone().multiplyScalar(Math.sin(angleA) * aLen));
                mid.position.copy(jointPos);
                mid.lookAt(target);
                end.position.copy(target);
                return { jointPos, endPos: target };
            }
        };

        class Fighter {
            constructor(id, color=0xffffff, posZ=0) {
                this.id = id;
                this.group = new THREE.Group();
                this.group.position.z = posZ;
                this.color = color;
                this.state = 'IDLE';
                this.stateTime = 0;
                this.sellTarget = null;
                this.sellTime = 0;
                this.sellLimb = null;
                this.partner = null;
                this.hp = 100;
                
                this.buildRig();
                scene.add(this.group);
                fighters.push(this);
            }

            buildRig() {
                const mat = new THREE.MeshPhongMaterial({ color: this.color });
                this.torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), mat);
                this.torso.position.y = 1.3;
                this.group.add(this.torso);
                this.head = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.3, 0.25), mat);
                this.head.position.y = 0.6;
                this.torso.add(this.head);

                this.limbs = {};
                const limbsConf = [
                    { name: 'LArm', parent: this.torso, pos: [-0.4, 0.3, 0], l1: 0.45, l2: 0.4 },
                    { name: 'RArm', parent: this.torso, pos: [0.4, 0.3, 0], l1: 0.45, l2: 0.4 },
                    { name: 'LLeg', parent: this.group, pos: [-0.2, 0.8, 0], l1: 0.5, l2: 0.5 },
                    { name: 'RLeg', parent: this.group, pos: [0.2, 0.8, 0], l1: 0.5, l2: 0.5 }
                ];

                limbsConf.forEach(c => {
                    const joint = new THREE.Group();
                    joint.position.set(...c.pos);
                    c.parent.add(joint);
                    const b1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, c.l1), mat);
                    b1.position.y = -c.l1/2; joint.add(b1);
                    const elbow = new THREE.Group();
                    elbow.position.y = -c.l1; joint.add(elbow);
                    const b2 = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, c.l2), mat);
                    b2.position.y = -c.l2/2; elbow.add(b2);
                    const end = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), mat);
                    end.position.y = -c.l2; elbow.add(end);
                    this.limbs[c.name] = { joint, elbow, end, len1: c.l1, len2: c.l2 };
                });
            }

            update(dt) {
                this.stateTime += dt;
                if (this.state !== 'DOWN') this.updateAI(dt);
                
                if (this.state === 'WALK') {
                    const speed = 1.6;
                    const dir = Math.sign(this.id==='P1'?-1:1);
                    this.group.position.z += dir * speed * dt;
                    
                    ['LLeg', 'RLeg'].forEach((name, i) => {
                        const limb = this.limbs[name];
                        const cycle = (this.stateTime * 6.0 + (i * Math.PI)) % (Math.PI * 2);
                        const targetY = Math.max(0, Math.sin(cycle) * 0.25);
                        const targetZ = Math.cos(cycle) * 0.4;
                        const start = new THREE.Vector3();
                        limb.joint.getWorldPosition(start);
                        raycaster.set(new THREE.Vector3(start.x, 10, start.z + targetZ), new THREE.Vector3(0, -1, 0));
                        const hit = raycaster.intersectObjects([floor, ...props])[0];
                        const hitY = hit ? hit.point.y : 0;
                        const target = new THREE.Vector3(start.x, hitY + targetY, start.z + targetZ);
                        IK.solve(new THREE.Vector3(0,0,0), limb.elbow, limb.end, limb.joint.worldToLocal(target.clone()), new THREE.Vector3(0,0,1), limb.len1, limb.len2);
                    });
                } else if (this.state === 'IDLE') {
                    ['LLeg', 'RLeg'].forEach(name => {
                        const limb = this.limbs[name];
                        IK.solve(new THREE.Vector3(0,0,0), limb.elbow, limb.end, new THREE.Vector3(0, -0.8, 0), new THREE.Vector3(0,0,1), limb.len1, limb.len2);
                    });
                } else if (this.state === 'ATTACK') {
                    const dur = 0.7;
                    const p = THREE.MathUtils.clamp(this.stateTime / dur, 0, 1);
                    // 4 phases: windup, strike, follow-through, recovery
                    let reach = 0;
                    if (p < 0.2) reach = -0.15 * (p/0.2);
                    else if (p < 0.4) reach = THREE.MathUtils.lerp(-0.15, 1.0, (p-0.2)/0.2);
                    else if (p < 0.6) reach = THREE.MathUtils.lerp(1.0, 1.25, (p-0.4)/0.2); // Punch through
                    else reach = THREE.MathUtils.lerp(1.25, 0, (p-0.6)/0.4);
                    
                    const limb = this.limbs.RArm;
                    IK.solve(new THREE.Vector3(0,0,0), limb.elbow, limb.end, new THREE.Vector3(reach, 0, 0.1), new THREE.Vector3(0,0,1), limb.len1, limb.len2);
                    
                    if (p > 0.35 && p < 0.45 && !this.hitConnected) {
                        this.hitConnected = true;
                        if (this.partner && this.group.position.distanceTo(this.partner.group.position) < 2.0) {
                            this.partner.triggerSell('HEAD');
                        }
                    }
                    if (p >= 1) { this.state = 'IDLE'; this.hitConnected = false; }
                }

                // --- VISCERAL SELLING (IK SNAP) ---
                if (this.sellTarget && this.sellTime > 0) {
                    this.sellTime -= dt;
                    if (!this.sellLimb) {
                        const worldTarget = new THREE.Vector3();
                        this.sellTarget.getWorldPosition(worldTarget);
                        const dL = worldTarget.distanceTo(this.limbs.LArm.joint.getWorldPosition(new THREE.Vector3()));
                        const dR = worldTarget.distanceTo(this.limbs.RArm.joint.getWorldPosition(new THREE.Vector3()));
                        this.sellLimb = dL < dR ? 'LArm' : 'RArm';
                    }
                    
                    const limb = this.limbs[this.sellLimb];
                    const worldTarget = new THREE.Vector3();
                    this.sellTarget.getWorldPosition(worldTarget);
                    worldTarget.add(new THREE.Vector3(0, 0, 0.15).applyQuaternion(this.group.quaternion));
                    
                    IK.solve(new THREE.Vector3(0,0,0), limb.elbow, limb.end, limb.joint.worldToLocal(worldTarget.clone()), new THREE.Vector3(0,1,0), limb.len1, limb.len2);
                    
                    if (this.sellTime < 0.1) { this.sellTarget = null; this.sellLimb = null; }
                } else if (this.state === 'GRAPPLING' && this.partner) {
                    ['LArm', 'RArm'].forEach(name => {
                        const hand = this.limbs[name];
                        const worldTarget = new THREE.Vector3();
                        const point = name === 'LArm' ? this.partner.limbs.RArm.joint : this.partner.limbs.LArm.joint;
                        point.getWorldPosition(worldTarget);
                        IK.solve(new THREE.Vector3(0,0,0), hand.elbow, hand.end, hand.joint.worldToLocal(worldTarget.clone()), new THREE.Vector3(0,0,1), hand.len1, hand.len2);
                    });
                } else if (this.state !== 'ATTACK') {
                    const sway = Math.sin(this.stateTime * 2) * 0.2;
                    this.limbs.RArm.joint.rotation.x = sway;
                    this.limbs.LArm.joint.rotation.x = -sway;
                }

                if (this.state === 'DOWN') {
                    // Procedural Ground Rollout
                    if (this.stateTime < 1.5) {
                        // Kicking reflexive
                        const freq = 15.0;
                        const amp = Math.max(0, 0.5 * (1.0 - this.stateTime/1.5));
                        ['LLeg', 'RLeg'].forEach((name, i) => {
                            const limb = this.limbs[name];
                            const phase = (this.stateTime * freq + (i * Math.PI));
                            const target = new THREE.Vector3(0.2, -0.6 + Math.sin(phase)*amp, 0.2 * Math.cos(phase)*amp);
                            IK.solve(new THREE.Vector3(0,0,0), limb.elbow, limb.end, target, new THREE.Vector3(0,0,1), limb.len1, limb.len2);
                        });
                    }
                    if (this.stateTime > 2.5) { this.state = 'IDLE'; this.stateTime = 0; this.torso.rotation.x = 0; this.group.position.y = 0; }
                    this.torso.rotation.x = THREE.MathUtils.lerp(this.torso.rotation.x, Math.PI/2.1, 0.1);
                    this.group.position.y = THREE.MathUtils.lerp(this.group.position.y, 0.15, 0.1);
                }
            }

            updateAI(dt) {
                if (this.id === 'P1') return;
                this.aiTimer = (this.aiTimer || 0) - dt;
                const dist = this.group.position.distanceTo(this.partner.group.position);
                if (this.aiTimer <= 0) {
                    if (dist > 3.0) this.state = 'WALK';
                    else if (dist < 1.8) {
                        if (Math.random() < 0.4) { this.state = 'ATTACK'; this.stateTime = 0; }
                        else if (Math.random() < 0.2) this.state = 'IDLE';
                    }
                    this.aiTimer = 1.0 + Math.random() * 2.0;
                }
            }

            triggerSell(region) {
                this.sellTime = 1.2;
                this.sellTarget = region === 'HEAD' ? this.head : this.torso;
                this.group.position.y += 0.2;
                setTimeout(() => this.group.position.y -= 0.2, 50);
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 5, 30);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 4, 6);
            camera.lookAt(0, 1, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const rim = new THREE.DirectionalLight(0x00ffff, 0.6);
            rim.position.set(5, 5, 5); scene.add(rim);

            const grid = new THREE.GridHelper(30, 30, 0x00ffff, 0x002222);
            scene.add(grid);

            floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x000000 }));
            floor.rotation.x = -Math.PI / 2; scene.add(floor);

            const stairMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            [0.3, 0.6, 0.9].forEach((h, i) => {
                const step = new THREE.Mesh(new THREE.BoxGeometry(4, h, 1.2), stairMat);
                step.position.set(0, h/2, -4 - i*1.2);
                scene.add(step); props.push(step);
            });

            const p1 = new Fighter('P1', 0x00ffff, 2);
            const p2 = new Fighter('P2', 0xff00ff, -2);
            p1.partner = p2; p2.partner = p1;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            fighters.forEach(f => f.update(dt));
            renderer.render(scene, camera);
        }

        init();
        window.TOGGLE_WALK = () => {
            const s = fighters[0].state === 'WALK' ? 'IDLE' : 'WALK';
            fighters.forEach(f => f.state = s);
        };
        window.TOGGLE_GRAPPLE = () => {
             const s = fighters[0].state === 'GRAPPLING' ? 'IDLE' : 'GRAPPLING';
             fighters.forEach(f => f.state = s);
        };
    </script>
    
    <div id="controls" class="absolute bottom-24 right-6 flex flex-col space-y-2 pointer-events-auto">
        <button onclick="window.TOGGLE_WALK()" class="px-4 py-2 bg-cyan-900/50 border border-cyan-500 text-white text-[10px]">TOGGLE LOCOMOTION</button>
        <button onclick="window.TOGGLE_GRAPPLE()" class="px-4 py-2 bg-blue-900/50 border border-blue-500 text-white text-[10px]">TOGGLE GRAPPLE IK</button>
        <button onclick="fighters[0].state='ATTACK'; fighters[0].stateTime=0;" class="px-4 py-2 bg-yellow-900/50 border border-yellow-500 text-white text-[10px]">STRIKE (4-PHASE)</button>
        <button onclick="window.TRIGGER_HIT('HEAD')" class="px-4 py-2 bg-red-900/50 border border-red-500 text-white text-[10px]">HEAD SELL</button>
        <button onclick="fighters[0].state='DOWN'; fighters[0].stateTime=0;" class="px-4 py-2 bg-purple-900/50 border border-purple-500 text-white text-[10px]">TRIGGER ROLLOUT</button>
    </div>


</body>
</html>
