<script>
/* ============================================================================
 * BANNON MODEL FORGE — Tripo3D-parity front end (additive module)
 * Everything Tripo3D's UI gives you, on your own free stack:
 *   • VIEWER   — orbit/zoom 3D preview of any GLB (generated, library, or imported)
 *   • LIBRARY  — browse generated + imported models; click to preview; assign to a character
 *   • GENERATE — text prompt -> your daemon's self provider -> live progress -> into the library
 *   • IMPORT   — load .glb/.gltf from local storage, single OR batch; preview, assign, keep
 * Binds through the engine's existing assignCharModel / loadFighterModel. No engine rewrite.
 * ============================================================================ */
(function () {
  'use strict';
  if (window.__MODEL_FORGE) return; window.__MODEL_FORGE = true;

  // Supabase (publishable/anon key is client-safe by design; service_role NEVER goes here)
  var SB_URL = window.SUPABASE_URL || 'https://knwijcermhpzkkpuqrxw.supabase.co';
  var SB_KEY = window.SUPABASE_ANON || 'sb_publishable_SQPdGgjnp9CkOYTy7EcuXw_B7NIgspB';
  window.MODEL_BASE = window.MODEL_BASE || (SB_URL + '/storage/v1/object/public/assets/');

  var LOCAL = [];   // in-session imported/generated entries: {name, url, char}
  var THREEref = window.THREE;
  function getLoader() { try { return new (window.GLTFLoader || THREEref.GLTFLoader)(); } catch (e) { return null; } }

  // ---------------- tiny GLB viewer (manual orbit; no OrbitControls dependency) ----------------
  function Viewer(canvas) {
    var T = THREEref;
    var scene = new T.Scene(); scene.background = new T.Color(0x0d1017);
    var cam = new T.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.01, 100);
    var rnd = new T.WebGLRenderer({ canvas: canvas, antialias: true });
    rnd.setSize(canvas.clientWidth, canvas.clientHeight, false);
    scene.add(new T.HemisphereLight(0xffffff, 0x333344, 1.1));
    var key = new T.DirectionalLight(0xffffff, 1.0); key.position.set(2, 4, 3); scene.add(key);
    var pivot = new T.Group(); scene.add(pivot);
    var yaw = 0.5, pitch = 0.1, dist = 3, target = new T.Vector3(0, 1, 0);
    function place() {
      cam.position.set(target.x + dist * Math.cos(pitch) * Math.sin(yaw), target.y + dist * Math.sin(pitch), target.z + dist * Math.cos(pitch) * Math.cos(yaw));
      cam.lookAt(target);
    }
    var down = false, lx = 0, ly = 0;
    canvas.onpointerdown = function (e) { down = true; lx = e.clientX; ly = e.clientY; };
    window.addEventListener('pointerup', function () { down = false; });
    window.addEventListener('pointermove', function (e) { if (!down) return; yaw -= (e.clientX - lx) * 0.01; pitch = Math.max(-1.2, Math.min(1.2, pitch + (e.clientY - ly) * 0.01)); lx = e.clientX; ly = e.clientY; });
    canvas.onwheel = function (e) { e.preventDefault(); dist = Math.max(0.5, Math.min(12, dist * (1 + Math.sign(e.deltaY) * 0.1))); };
    var cur = null;
    this.load = function (url) {
      var ld = getLoader(); if (!ld) return;
      ld.load(url, function (g) {
        if (cur) pivot.remove(cur); cur = g.scene || g.scenes[0]; pivot.add(cur);
        var box = new T.Box3().setFromObject(cur), c = box.getCenter(new T.Vector3()), s = box.getSize(new T.Vector3());
        target.copy(c); dist = Math.max(s.x, s.y, s.z) * 1.8 || 3;
      }, undefined, function (err) { console.warn('[forge] load failed', url, err); });
    };
    (function anim() { requestAnimationFrame(anim); place(); rnd.render(scene, cam); })();
  }

  // ---------------- data ----------------
  function resolve(u) { return (!u || u.indexOf('embedded:') === 0 || u.indexOf('http') === 0 || u.indexOf('blob:') === 0 || u.indexOf('data:') === 0) ? u : ((window.MODEL_BASE || '') + u); }
  function libraryFromSupabase() {
    return fetch(SB_URL + '/rest/v1/gen_jobs?status=eq.succeeded&select=character_key,glb_url,prompt&order=created_at.desc', { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } })
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (rows) { return (rows || []).map(function (r) { return { name: (r.character_key || 'model') + ' (gen)', url: r.glb_url, char: r.character_key }; }); })
      .catch(function () { return []; });
  }
  function chars() { try { return Object.keys(window.ATTIRE || {}).concat(['BANNON', 'MAIME']).filter(function (v, i, a) { return a.indexOf(v) === i; }); } catch (e) { return ['BANNON', 'MAIME']; } }

  function assign(entry, ck) {
    if (!ck) return;
    try { if (typeof assignCharModel === 'function') assignCharModel(ck, resolve(entry.url), entry.name); } catch (e) {}
    ['p1', 'p2'].forEach(function (sd) {
      try { var f = fighterFor(sd); if (f && charModelKey(f) === ck.toUpperCase()) { f.model = null; loadFighterModel(sd, resolve(entry.url), entry.name); } } catch (e) {}
    });
    msg(entry.name + ' → ' + ck);
  }

  // ---------------- UI ----------------
  var msgEl, viewer, tab = 'LIBRARY';
  function msg(t) { if (msgEl) msgEl.textContent = t; }

  function build() {
    var open = document.createElement('button'); open.textContent = 'MODEL FORGE';
    open.style.cssText = 'position:fixed;top:8px;right:96px;z-index:99998;font:bold 12px monospace;padding:8px 12px;border-radius:9px;border:1px solid #33d0ff;background:rgba(10,10,14,.92);color:#8fe6ff;cursor:pointer';
    document.body.appendChild(open);

    var modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:5% 4%;z-index:99999;display:none;background:rgba(10,12,18,.98);border:1px solid #2a3340;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.7);color:#dce4f0;font:12px system-ui,monospace;overflow:hidden';
    document.body.appendChild(modal);
    open.onclick = function () { modal.style.display = 'block'; render(modal); };

    window.__forgeRender = function () { if (modal.style.display !== 'none') render(modal); };
  }

  function render(modal) {
    modal.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #222">' +
      '<b style="color:#8fe6ff;letter-spacing:1px">MODEL FORGE</b>' +
      '<span style="opacity:.5">Tripo3D-parity · your free stack</span>' +
      '<button id="fgX" style="margin-left:auto;background:#1a1f27;color:#ccc;border:1px solid #333;border-radius:6px;padding:5px 10px;cursor:pointer">✕</button></div>' +
      '<div style="display:flex;height:calc(100% - 46px)">' +
      '<div style="width:200px;border-right:1px solid #222;padding:10px;display:flex;flex-direction:column;gap:6px" id="fgTabs"></div>' +
      '<div style="flex:1;display:flex;min-width:0">' +
      '<div style="flex:1;padding:12px;overflow:auto" id="fgMain"></div>' +
      '<div style="width:44%;border-left:1px solid #222;display:flex;flex-direction:column">' +
      '<canvas id="fgView" style="flex:1;width:100%;display:block;touch-action:none"></canvas>' +
      '<div id="fgAssign" style="padding:10px;border-top:1px solid #222"></div></div></div></div>';

    modal.querySelector('#fgX').onclick = function () { modal.style.display = 'none'; };
    ['LIBRARY', 'GENERATE', 'IMPORT'].forEach(function (t) {
      var b = document.createElement('button'); b.textContent = t;
      b.style.cssText = 'text-align:left;padding:9px;border-radius:7px;border:1px solid ' + (t === tab ? '#33d0ff' : '#333') + ';background:' + (t === tab ? 'rgba(51,208,255,.14)' : '#151a22') + ';color:#dce4f0;cursor:pointer;font:bold 11px monospace';
      b.onclick = function () { tab = t; render(modal); };
      modal.querySelector('#fgTabs').appendChild(b);
    });
    msgEl = document.createElement('div'); msgEl.style.cssText = 'margin-top:auto;opacity:.7;font:10px monospace;min-height:14px'; modal.querySelector('#fgTabs').appendChild(msgEl);

    var canvas = modal.querySelector('#fgView');
    setTimeout(function () { try { if (THREEref) viewer = new Viewer(canvas); } catch (e) { canvas.replaceWith(Object.assign(document.createElement('div'), { textContent: 'viewer needs THREE', style: 'padding:20px;opacity:.6' })); } }, 30);

    var main = modal.querySelector('#fgMain');
    if (tab === 'LIBRARY') renderLibrary(main, modal);
    else if (tab === 'GENERATE') renderGenerate(main);
    else renderImport(main);
  }

  function entryCard(e, modal) {
    var d = document.createElement('button');
    d.style.cssText = 'display:block;width:100%;text-align:left;margin-bottom:6px;padding:9px;border-radius:8px;border:1px solid #333;background:#131720;color:#dce4f0;cursor:pointer;font:11px monospace';
    d.textContent = e.name;
    d.onclick = function () {
      if (viewer) viewer.load(resolve(e.url));
      var ass = modal.querySelector('#fgAssign');
      ass.innerHTML = '<div style="opacity:.7;margin-bottom:6px">Assign "' + e.name + '" to:</div>';
      var sel = document.createElement('select'); sel.style.cssText = 'width:100%;padding:6px;background:#0b0e14;color:#cde;border:1px solid #444;border-radius:6px';
      chars().forEach(function (c) { var o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
      if (e.char) sel.value = e.char.toUpperCase();
      var go = document.createElement('button'); go.textContent = 'SET AS DEFAULT'; go.style.cssText = 'margin-top:8px;width:100%;padding:8px;background:#0e2a33;color:#8fe6ff;border:1px solid #33d0ff;border-radius:6px;cursor:pointer;font:bold 11px monospace';
      go.onclick = function () { assign(e, sel.value); };
      ass.appendChild(sel); ass.appendChild(go);
    };
    return d;
  }

  function renderLibrary(main, modal) {
    main.innerHTML = '<div style="opacity:.7;margin-bottom:8px">Generated + imported models. Click to preview, then assign.</div><div id="fgList">loading…</div>';
    var list = main.querySelector('#fgList');
    libraryFromSupabase().then(function (remote) {
      var all = LOCAL.concat(remote);
      list.innerHTML = all.length ? '' : '<div style="opacity:.5">No models yet — generate one or import a .glb.</div>';
      all.forEach(function (e) { list.appendChild(entryCard(e, modal)); });
    });
  }

  function renderGenerate(main) {
    main.innerHTML = '<div style="opacity:.7;margin-bottom:8px">Text → model, through your daemon (self provider). Needs OWN_GEN_URL set + the Colab notebook running.</div>';
    var ta = document.createElement('textarea'); ta.placeholder = 'e.g. a hulking masked luchador, muscular, red and gold gear, full body T-pose';
    ta.style.cssText = 'width:100%;height:80px;box-sizing:border-box;padding:8px;background:#0b0e14;color:#cde;border:1px solid #444;border-radius:7px;font:12px monospace'; main.appendChild(ta);
    var row = document.createElement('div'); row.style.cssText = 'display:flex;gap:8px;margin-top:8px;align-items:center';
    var sel = document.createElement('select'); sel.style.cssText = 'flex:1;padding:7px;background:#0b0e14;color:#cde;border:1px solid #444;border-radius:6px';
    var none = document.createElement('option'); none.value = ''; none.textContent = 'bind to… (optional)'; sel.appendChild(none);
    chars().forEach(function (c) { var o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
    var gen = document.createElement('button'); gen.textContent = 'GENERATE'; gen.style.cssText = 'padding:9px 16px;background:#0e2a33;color:#8fe6ff;border:1px solid #33d0ff;border-radius:7px;cursor:pointer;font:bold 12px monospace';
    row.appendChild(sel); row.appendChild(gen); main.appendChild(row);
    var prog = document.createElement('div'); prog.style.cssText = 'margin-top:10px;opacity:.8;font:11px monospace'; main.appendChild(prog);
    gen.onclick = function () {
      var p = ta.value.trim(); if (!p) return; prog.textContent = 'submitting…';
      if (typeof window.generateCharacterModel !== 'function') { prog.textContent = 'generateCharacterModel not found in this build.'; return; }
      try {
        window.generateCharacterModel(p, { characterId: sel.value || undefined, onProgress: function (j) { prog.textContent = 'gen ' + (j.status || '') + ' ' + (j.progress || 0) + '%'; },
          onDone: function (j) { var url = j.glbUrl || j.url; if (url) { LOCAL.unshift({ name: p.slice(0, 24) + ' (gen)', url: url, char: sel.value }); if (viewer) viewer.load(resolve(url)); prog.textContent = 'done ✓ added to library'; } else prog.textContent = 'finished, no url'; } });
      } catch (e) { prog.textContent = 'error: ' + e.message; }
    };
  }

  function renderImport(main) {
    main.innerHTML = '<div style="opacity:.7;margin-bottom:8px">Load .glb / .gltf from your machine — single or batch. Previews, keeps in the library, assigns.</div>';
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.glb,.gltf'; inp.multiple = true;
    inp.style.cssText = 'display:block;margin-bottom:10px;color:#cde';
    inp.onchange = function (e) {
      var files = Array.from(e.target.files || []);
      files.forEach(function (f) {
        var url = URL.createObjectURL(f);
        var entry = { name: f.name.replace(/\.(glb|gltf)$/i, ''), url: url, char: null, local: true };
        LOCAL.unshift(entry);
        if (viewer) viewer.load(url);
      });
      msg('imported ' + files.length + ' file(s)');
      tab = 'LIBRARY'; window.__forgeRender && window.__forgeRender();
    };
    main.appendChild(inp);
    var note = document.createElement('div'); note.style.cssText = 'opacity:.5;font:10px monospace'; note.textContent = 'Imported models preview and bind instantly, but a local blob URL only lasts this session — upload the .glb to your bucket to make the binding permanent.'; main.appendChild(note);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', build); else build();
})();
</script>
