name: Build Android APK (WebView game)

# Compiles the BANNON web game into a real installable .apk — no Unreal build needed. The game HTML is
# bundled into the app's assets at build time; AAA models stream from the repo CDN. Download the APK from
# this run's Artifacts on your phone and install it (allow "install unknown apps" once). See
# docs/MOBILE_INSTALL.md. Trigger it from the Actions tab (Run workflow) or on a push to the android app.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'BANNON_v150.html'
      - '.github/workflows/android.yml'

permissions:
  contents: write   # so the built APK can be committed back to dist/ on main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle the game + manifest/icons into the app assets
        run: |
          mkdir -p android/app/src/main/assets/assets/icons
          cp BANNON_v150.html android/app/src/main/assets/index.html
          cp manifest.json    android/app/src/main/assets/manifest.json || true
          cp assets/icons/icon-192.png assets/icons/icon-512.png assets/icons/apple-touch-icon.png \
             android/app/src/main/assets/assets/icons/ || true
          echo "bundled index.html ($(du -h android/app/src/main/assets/index.html | cut -f1))"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        uses: gradle/actions/setup-gradle@v3
      - run: gradle -p android assembleDebug --no-daemon

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BANNON-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Keep the in-repo APK current: on a push to main, commit the freshly built APK to dist/BANNON.apk
      # so the game app upgrades along with the game/repo. dist/ is NOT in the trigger paths, so this
      # commit does not re-trigger the workflow (no loop); [skip ci] belt-and-suspenders.
      - name: Publish APK to dist/ (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/BANNON.apk
          git config user.name  "bannon-ci"
          git config user.email "ci@bannon.local"
          git add dist/BANNON.apk
          if git diff --cached --quiet; then echo "APK unchanged"; else
            git commit -m "ci: rebuild dist/BANNON.apk from ${GITHUB_SHA::7} [skip ci]"
            git push
          fi
