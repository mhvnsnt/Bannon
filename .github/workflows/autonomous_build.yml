name: Autonomous Build & Verify Loop

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-node-backend:
    name: Build Node.js Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Compile TypeScript
        run: npm run build

  build-unreal-physics:
    name: Compile Native Unreal C++
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      # Uses GameCI to build Unreal Engine projects autonomously without a local PC
      - name: Build Unreal Project (GameCI)
        uses: epicgames/unreal-engine-github-action@v1
        with:
          project: unreal/Bannon.uproject
          target: BannonEditor
          build-configuration: Development
          platform: Linux
        env:
          # Required to access Unreal Engine Docker images
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
