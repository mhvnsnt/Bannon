plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bannon.game'
    compileSdk 34

    defaultConfig {
        applicationId "com.bannon.game"
        minSdk 24            // Android 7.0+ (modern WebView with WebGL2)
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // debug-signed by default in CI; a release keystore can be wired later for Play upload.
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
